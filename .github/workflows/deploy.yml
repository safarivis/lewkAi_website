name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 72.62.235.141 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@72.62.235.141 '
            cd /var/www/lewkai.com
            sudo chown -R ubuntu:ubuntu .
            git pull origin main
            npm install --production=false
            npm run build
            sudo pm2 restart lewkai
            echo "Deployment complete!"
          '
