name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.235.141
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/lewkai.com
            git pull origin main
            npm install --production=false
            npm run build
            pm2 restart lewkai
            echo "Deployment complete!"
